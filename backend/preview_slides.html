<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/white.css">
<style>
  .reveal h1, .reveal h2 { color: inherit; }
  .reveal section[data-background-color] h2,
  .reveal section[data-background-gradient] h1,
  .reveal section[data-background-gradient] p { color: #fff; }
  .reveal .diagram { border: 2px dashed #2563eb; border-radius: 12px; padding: 24px;
     margin: 16px auto; max-width: 70%; font-style: italic; }
  .reveal ul { display: inline-block; text-align: left; }
</style>
</head>
<body>
<div class="reveal"><div class="slides">
<section data-background-gradient="linear-gradient(to bottom, #1e3a8a, #2563eb)"><h1> Working at Heights</h1></section>
<section data-background-color="#7f1d1d"><h2>⚠️ Fall Hazard</h2><ul><li class="fragment">Unprotected edges</li><li class="fragment">Fragile skylights</li></ul></section>
<section data-background-color="#064e3b"><h2> Recap</h2><ul><li class="fragment">Use the ABCs</li></ul></section>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
<script>Reveal.initialize({ hash: true, transition: 'slide' });</script>
</body>
</html>
