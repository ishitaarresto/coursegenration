# AWS CodeBuild — builds Flutter web + Docker image, pushes to ECR
# Required CodeBuild environment variables:
#   AWS_ACCOUNT_ID, AWS_DEFAULT_REGION, ECR_REPO_NAME, API_BASE_URL

version: 0.2

env:
  variables:
    FLUTTER_VERSION: "3.27.0"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      # Install Flutter
      - curl -o /tmp/flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
      - tar -xf /tmp/flutter.tar.xz -C /opt
      - export PATH="$PATH:/opt/flutter/bin"
      - flutter precache --web
      - flutter --version

  pre_build:
    commands:
      # Authenticate to ECR
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)

  build:
    commands:
      # Build Flutter web with production API URL
      - cd frontend-lms
      - flutter pub get
      - flutter build web --dart-define=API_BASE_URL=$API_BASE_URL --release
      - cd ..
      # Build Docker image (Flutter output is now at frontend-lms/build/web/)
      - docker build -t $IMAGE_URI:$IMAGE_TAG -t $IMAGE_URI:latest .

  post_build:
    commands:
      - docker push $IMAGE_URI:$IMAGE_TAG
      - docker push $IMAGE_URI:latest
      # Write the image URI to a file for ECS deploy action
      - printf '[{"name":"arresto-lms","imageUri":"%s"}]' "$IMAGE_URI:$IMAGE_TAG" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - deploy/ecs-task-definition.json
